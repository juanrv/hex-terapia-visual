name: Release Terapia Visual

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # ¡Esto nos permitirá forzar la ejecución con un botón manual!

jobs:
  analyze-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          
      - name: Analizar código con Clippy
        working-directory: ./terapia-visual
        run: cargo clippy --all-targets --all-features
        
      - name: Ejecutar Tests Unitarios
        working-directory: ./terapia-visual
        run: cargo test --workspace

  build-and-release:
    needs: analyze-and-test
    runs-on: windows-latest
    permissions:
      contents: write 

    steps:
      - uses: actions/checkout@v4
      
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          
      - name: Instalar dependencias del Frontend
        working-directory: ./terapia-visual/terapia_visual_app
        run: npm install
        
      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Compilar App y Crear Release en GitHub
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v1.0.0
          releaseName: 'Terapia Visual v1.0.0'
          releaseBody: 'Versión 1.0.0 oficial de Terapia Visual.'
          releaseDraft: false
          prerelease: false
          projectPath: ./terapia-visual/terapia_visual_app

name: Publicar Documentacion en GitHub Pages

# Se ejecuta automáticamente al hacer push a main o dev
on:
  push:
    branches: ["main", "dev"]
  workflow_dispatch: # Botón manual por si acaso

permissions:
  contents: write # Necesario para que el bot pueda subir código a la rama gh-pages

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4
      
      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Generar Documentación (cargo doc)
        working-directory: ./terapia-visual
        run: cargo doc --workspace --no-deps
        
      - name: Crear un Index Central (Punto de entrada)
        working-directory: ./terapia-visual/target/doc
        # Inyectar un HTML directamente en la carpeta de docs antes de publicar
        run: |
          cat <<EOF > index.html
          <!DOCTYPE html>
          <html lang="es">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Documentación - Terapia Visual</title>
              <style>
                  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f4f6f8; color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; }
                  .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; width: 100%; text-align: center; }
                  h1 { color: #2c3e50; margin-bottom: 10px; }
                  p { color: #7f8c8d; margin-bottom: 30px; }
                  ul { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 15px; }
                  li a { display: block; padding: 15px; background-color: #ecf0f1; border-radius: 8px; text-decoration: none; color: #2980b9; font-weight: bold; font-size: 1.1rem; transition: background-color 0.2s, color 0.2s; }
                  li a:hover { background-color: #3498db; color: white; }
                  .footer { margin-top: 30px; font-size: 0.85rem; color: #bdc3c7; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>📚 Terapia Visual</h1>
                  <p>Documentación técnica de la Arquitectura Hexagonal</p>
                  <ul>
                      <li><a href="terapia_visual_domain/index.html">🛡️ Dominio (Reglas de Negocio)</a></li>
                      <li><a href="terapia_visual_adapter/index.html">🔌 Adaptadores (Almacenamiento, Overlay)</a></li>
                      <li><a href="terapia_visual_app_lib/index.html">🖥️ Aplicación Tauri (Comandos y Setup)</a></li>
                  </ul>
                  <div class="footer">Generado automáticamente por cargo doc</div>
              </div>
          </body>
          </html>
          EOF

      - name: Desplegar a la rama gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./terapia-visual/target/doc
          publish_branch: gh-pages

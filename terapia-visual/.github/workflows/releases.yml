name: Release Terapia Visual

# El workflow se activará automáticamente SOLO cuando crees un Tag que empiece por "v" (ej: v1.0.0)
on:
  push:
    tags:
      - "v*"

jobs:
  # Trabajo 1: Análisis de Código (SonarQube de Rust) y Pruebas
  analyze-and-test:
    runs-on: windows-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Analizar código con Clippy (Code Quality)
        # Esto buscará malas prácticas en el código. Si hay errores graves, detiene el proceso.
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Ejecutar Tests Unitarios
        # Corre tus 45 tests automáticamente
        run: cargo test --workspace

  # Trabajo 2: Compilación y Publicación (Solo se ejecuta si el Trabajo 1 pasa)
  build-and-release:
    needs: analyze-and-test
    runs-on: windows-latest

    # IMPORTANTE: Permiso para que el bot pueda crear la Release en tu repositorio
    permissions:
      contents: write

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias del Frontend
        working-directory: ./terapia_visual_app
        run: npm install

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Compilar App y Crear Release en GitHub
        # Acción oficial de Tauri que hace toda la magia
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Terapia Visual ${{ github.ref_name }}"
          releaseBody: "Versión 1.0.0 de Terapia Visual. Ejecutable generado automáticamente."
          releaseDraft: false
          prerelease: false
          projectPath: ./terapia_visual_app

<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title data-i18n="app_title">Terapia Visual</title>
    <link rel="icon" type="image/png" href="../src-tauri/icons/32x32.png" />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- HEADER FIJO -->
      <header>
        <h1 data-i18n="app_title">Terapia Visual</h1>
        <div class="lang-controls">
          <button id="btn-es" data-i18n="btn_spanish">Español</button>
          <button id="btn-en" data-i18n="btn_english">English</button>
        </div>
      </header>

      <!-- MENÚ PRINCIPAL (siempre visible) -->
      <div id="view-home" class="view">
        <div
          style="
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
          "
        >
          <button
            id="btn-nav-color"
            style="
              padding: 20px;
              font-size: 1.1rem;
              background-color: #3498db;
              color: white;
            "
            data-i18n="menu_color_division"
          >
            Terapia de División de Color
          </button>
          <button
            id="btn-nav-reading"
            style="
              padding: 20px;
              font-size: 1.1rem;
              background-color: #9b59b6;
              color: white;
            "
            data-i18n="menu_reading"
          >
            Terapia de Lectura
          </button>
          <button
            id="btn-exit"
            style="
              padding: 15px;
              margin-top: 20px;
              background-color: #e74c3c;
              color: white;
            "
            data-i18n="btn_exit"
          >
            Salir de la Aplicación
          </button>
        </div>
      </div>

      <!-- CONTENEDOR DINÁMICO PARA TERAPIAS -->
      <div id="app-content"></div>

      <!-- STATUS GLOBAL -->
      <div id="status"></div>
    </div>
    <script type="module" src="../main.ts"></script>
  </body>
</html>

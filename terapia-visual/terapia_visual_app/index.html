<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title data-i18n="app_title">Terapia Visual</title>
    <link rel="icon" type="image/png" href="/src-tauri/icons/32x32.png" />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div class="app-container">
      <header>
        <h1 data-i18n="app_title">Terapia Visual</h1>
        <div class="lang-controls">
          <button id="btn-es" data-i18n="btn_spanish">Español</button>
          <button id="btn-en" data-i18n="btn_english">English</button>
        </div>
      </header>

      <!-- MENÚ PRINCIPAL (siempre visible por defecto) -->
      <div id="view-home" class="view">
        <div class="menu-container">
          <button
            id="btn-nav-color"
            class="menu-btn menu-btn-color"
            data-i18n="menu_color_division"
          >
            Terapia de División de Color
          </button>
          <button
            id="btn-nav-reading"
            class="menu-btn menu-btn-reading"
            data-i18n="menu_reading"
          >
            Terapia de Lectura
          </button>
          <button
            id="btn-exit"
            class="menu-btn menu-btn-exit"
            data-i18n="btn_exit"
          >
            Salir de la Aplicación
          </button>
        </div>
      </div>

      <!-- CONTENEDOR DINÁMICO PARA TERAPIAS -->
      <div id="app-content"></div>

      <div id="status"></div>
    </div>
    <!-- Ruta corregida -->
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>

<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title data-i18n="app_title">Terapia Visual</title>
    <style>
      button {
        margin: 10px;
        padding: 8px 16px;
      }
    </style>
  </head>
  <body>
    <h1 data-i18n="app_title">Terapia Visual</h1>
    <button id="btn-start" data-i18n="btn_start">Iniciar Terapia</button>
    <button id="btn-stop" data-i18n="btn_stop">Detener Terapia</button>
    <button id="btn-update" data-i18n="btn_update">
      Actualizar Configuración
    </button>
    <button id="btn-get" data-i18n="btn_get">
      Mostrar Configuración en Consola
    </button>
    <button id="btn-layout-vertical">Layout Vertical</button>
    <button id="btn-layout-horizontal">Layout Horizontal</button>
    <div>
      <button id="btn-es" data-i18n="btn_spanish">Español</button>
      <button id="btn-en" data-i18n="btn_english">English</button>
    </div>
    <div id="status"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
